name: Build and commit dist

on:
  push:
    branches: [main]
    paths-ignore:
      - 'dist/**'       # avoid infinite loop of commits when pushing dist

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed for committing changes to the repository

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Commit dist
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: build dist [skip ci]'
          file_pattern: dist/
